apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: project-role
  namespace: default
rules:
- apiGroups: ["", "apps", "networking.k8s.io"]
  resources:
    - pods
    - pods/log
    - services
    - deployments
    - persistentvolumeclaims
    - ingresses
  verbs:
    - get
    - list
    - create
    - delete
    - update
    - patch
